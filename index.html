<style>

body{

color:#e5e5e5;

}

header{
padding:80px 20px;

}

}

.map{

}

.well{

<body>

<header>

<h1>MISTERI SUMUR</h1>

<p>
Mengapa Alkitab mengingat sumur-sumur Ishak?
</p>

<p>
Klik salah satu sumur untuk memulai.
</p>

</header>

<div class="progress-wrap">

<div class="progress-label">
Penjelajahan 60%
</div>

<div class="progress">
<div class="bar" style="width:60%;"></div>
</div>

<style>

.progress-wrap{
max-width:800px;
margin:30px auto;
padding:0 20px;
}

.progress-label{
margin-bottom:10px;
color:#87bfff;
}

.progress{
height:12px;
background:#222;
border-radius:20px;
overflow:hidden;
}

.bar{
height:100%;
background:#87bfff;
}

</style>

</div>

<div class="map">

<div class="well" onclick="showStory('esek')">
ESEK
</div>

<div class="well" onclick="showStory('sitnah')">
SITNAH
</div>

<div class="well" onclick="showStory('rehobot')">
REHOBOT
</div>

<div class="well" onclick="showStory('beer')">
BEERSYEBA
</div>

</div>

<div id="story" class="story"></div>

<div class="footer">

<a href="https://page.norman-lab.workers.dev/"class="btn">
Lanjut Menelusuri →
</a>

</div>

<script>

function showStory(type){

let content="";

if(type==="esek"){

content=`

<h2>ESEK</h2>

<p>
Esek berarti perselisihan.
</p>

<p>
Ishak menggali.
Air ditemukan.
Tetapi orang lain memperebutkannya.
</p>

<div class="quote">

Tidak semua sumber kehidupan akan diterima tanpa pertentangan.

</div>

<p>
DOMUS ISAACI melihat Esek sebagai ruang pertama:
tempat manusia belajar bahwa setiap warisan akan diuji.
</p>

`;

}

if(type==="sitnah"){

content=`

<h2>SITNAH</h2>

<p>
Sitnah berarti permusuhan.
</p>

<p>
Perselisihan berubah menjadi penolakan.
</p>

<div class="quote">

Kadang masalah bukan lagi soal air.

Tetapi soal hati manusia.

</div>

<p>
Sumur kedua mengajarkan bahwa tidak semua konflik dapat dimenangkan.
</p>

`;

}

if(type==="rehobot"){

content=`

<h2>REHOBOT</h2>

<p>
Rehobot berarti kelapangan.
</p>

<p>
Untuk pertama kalinya tidak ada yang merebut sumur itu.
</p>

<div class="quote">

Setelah pertikaian dan penolakan,
akhirnya ada ruang.

</div>

<p>
Mungkin rumah tidak dibangun melalui kemenangan.
Tetapi melalui ketekunan.
</p>

`;

}

if(type==="beer"){

content=`

<h2>BEERSYEBA</h2>

<p>
Di sini Ishak membangun mezbah.
</p>

<p>
Di sini sumur dan perjanjian bertemu.
</p>

<div class="quote">

Rumah bukan sekadar tempat tinggal.

Rumah adalah tempat perjanjian dipelihara.

</div>

<p>
Inilah salah satu inti DOMUS ISAACI.

Sumur bukan sekadar sumber air.

Sumur adalah memori hidup sebuah rumah.

</p>

`;

}

document.getElementById("story").style.display="block";
document.getElementById("story").innerHTML=content;

}

</script>
